<!-- IMAGE LIGHTBOX (ENHANCED) -->
<div id="lightbox">
  <span onclick="closeGallery()">×</span>
  <img id="lightbox-img" alt="Gallery preview">
  <button class="nav-btn prev-btn" onclick="change(-1)">❮</button>
  <button class="nav-btn next-btn" onclick="change(1)">❯</button>
  <div class="lightbox-counter" id="lightboxCounter"></div>
</div>

<!-- VIDEO MODAL (ENHANCED) -->
<div id="videoBox">
  <span onclick="closeVideos()">×</span>
  <video id="videoPlayer" controls></video>
  <button class="nav-btn prev-vid" onclick="changeVideo(-1)">❮</button>
  <button class="nav-btn next-vid" onclick="changeVideo(1)">❯</button>
  <div class="video-counter" id="videoCounter"></div>
</div>

<script>
// ========== IMAGE GALLERY LOGIC (with counter) ==========
let images = [], index = 0;
let lightboxCounter = document.getElementById('lightboxCounter');

function openGallery(imgs, i) {
  images = imgs;
  index = i;
  const lightbox = document.getElementById("lightbox");
  lightbox.style.display = "flex";
  updateLightboxCounter();
  show();
}

function closeGallery() {
  document.getElementById("lightbox").style.display = "none";
}

function change(n) {
  index = (index + n + images.length) % images.length;
  updateLightboxCounter();
  show();
}

function show() {
  const imgElement = document.getElementById("lightbox-img");
  imgElement.src = images[index];
  imgElement.alt = `Gallery image ${index+1} of ${images.length}`;
}

function updateLightboxCounter() {
  if(lightboxCounter && images.length) {
    lightboxCounter.textContent = `${index+1} / ${images.length}`;
  }
}

// ========== VIDEO GALLERY LOGIC (with counter) ==========
let videos = [], vIndex = 0;
let videoCounter = document.getElementById('videoCounter');

function openVideos(v, i) {
  videos = v;
  vIndex = i;
  const videoBox = document.getElementById("videoBox");
  videoBox.style.display = "flex";
  updateVideoCounter();
  showVideo();
}

function closeVideos() {
  const videoBox = document.getElementById("videoBox");
  videoBox.style.display = "none";
  const player = document.getElementById("videoPlayer");
  if(player) player.pause();
}

function changeVideo(n) {
  vIndex = (vIndex + n + videos.length) % videos.length;
  updateVideoCounter();
  showVideo();
}

function showVideo() {
  let player = document.getElementById("videoPlayer");
  player.src = videos[vIndex];
  player.load();
  player.play().catch(e => console.log("Autoplay blocked, user interaction needed"));
}

function updateVideoCounter() {
  if(videoCounter && videos.length) {
    videoCounter.textContent = `${vIndex+1} / ${videos.length}`;
  }
}

// Optional: close modals with ESC key
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape') {
    if(document.getElementById("lightbox").style.display === 'flex') closeGallery();
    if(document.getElementById("videoBox").style.display === 'flex') closeVideos();
  }
  // left/right arrow navigation for active modal
  if(document.getElementById("lightbox").style.display === 'flex') {
    if(e.key === 'ArrowLeft') change(-1);
    if(e.key === 'ArrowRight') change(1);
  }
  if(document.getElementById("videoBox").style.display === 'flex') {
    if(e.key === 'ArrowLeft') changeVideo(-1);
    if(e.key === 'ArrowRight') changeVideo(1);
  }
});
</script>
